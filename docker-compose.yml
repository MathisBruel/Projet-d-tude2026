services:
  backend:
    build: ./backend
    image: agrisenseregistry.azurecr.io/agrisense-backend:latest
    ports:
      - "5001:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    restart: unless-stopped
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - ./data:/data/db
    restart: unless-stopped
